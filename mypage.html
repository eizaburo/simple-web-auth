<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPage</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        header
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="mypage.html">MyPage</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </header>
    <main class="hidden">
        <section class="common_section">
            <h1 style="color: #f00;">MyPageページ（認証有り）</h1>
            <p>MyPageです。</p>
            <p id="my_uid">uid:</p>
            <p id="my_email">Email:</p>
            <p id="my_full_name">氏名:</p>
            <p id="my_phone_no">電話番号:</p>
        </section>
        <button id="logout_button">ログアウト</button>
    </main>
    <footer>
        footer
    </footer>
    <script type="module">

        //import
        import { app } from "./script.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        // auth, db取得
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ログインを確認し、ログイン状態じゃなければ弾く（login.htmlにリダイレクト）。
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                location.href = "login.html";
            } else {
                // authenticationの情報を表示
                document.getElementById("my_uid").textContent = `uid: ${user.uid}`;
                document.getElementById("my_email").textContent = `Email: ${user.email}`;

                // entriesコレクションからuidに紐づいたデータを取得
                const docSnap = await getDoc(doc(db, "entries", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("my_full_name").textContent = `氏名: ${data.full_name ?? ""}`;
                    document.getElementById("my_phone_no").textContent = `電話番号: ${data.phone_no ?? ""}`;
                } else {
                    document.getElementById("my_full_name").textContent = "氏名: ";
                    document.getElementById("my_phone_no").textContent = "電話番号: ";
                }

                // 非表示を解除
                document.querySelector("main").classList.remove("hidden");
            }
        });

        // ログアウト
        document.getElementById("logout_button").addEventListener("click", async () => {
            await signOut(auth);
            // location.href = "login.html";
        });

    </script>
</body>

</html>
